<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3CAC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="0" y="14" width="96" height="96" rx="22" ry="22"
    fill="url(#grad)"
    transform="rotate(-6, 48, 62)" />
  <text x="48" y="78"
    font-family="'Segoe UI', 'Arial Black', system-ui, sans-serif"
    font-weight="900"
    font-size="42"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1">HA</text>

  <!-- Wordmark -->
  <text x="118" y="96"
    font-family="'Segoe UI', 'Arial Black', system-ui, sans-serif"
    font-weight="900"
    font-size="72"
    fill="url(#grad)"
    letter-spacing="-3">HushAsk</text>

  <!-- Tagline -->
  <text x="120" y="122"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-weight="500"
    font-size="14"
    fill="#555555"
    letter-spacing="3">BY HONESTALIAS</text>
</svg>
