<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" width="960" height="960">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3CAC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background badge -->
  <rect x="80" y="80" width="800" height="800" rx="200" ry="200"
    fill="url(#grad)"
    transform="rotate(-6, 480, 480)" />

  <!-- Monogram -->
  <text
    x="480" y="620"
    font-family="'Segoe UI', 'Arial Black', system-ui, sans-serif"
    font-weight="900"
    font-size="460"
    fill="white"
    text-anchor="middle"
    letter-spacing="-20">HA</text>
</svg>
